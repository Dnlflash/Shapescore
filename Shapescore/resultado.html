<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Resultado Completo</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:420px;
background:rgba(17,24,39,0.7);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
box-shadow:0 0 40px rgba(99,102,241,0.2);
}

h1{
text-align:center;
background:linear-gradient(90deg,#6366f1,#22d3ee);
-webkit-background-clip:text;
color:transparent;
}

.block{
margin-top:20px;
padding:15px;
border-radius:12px;
background:#020617;
border:1px solid rgba(255,255,255,0.05);
}

.big{
font-size:32px;
font-weight:bold;
color:#22d3ee;
}

</style>

</head>

<body>

<div class="container">

<h1>Full Physique Analysis</h1>

<div class="block">
<p>Body Fat</p>
<div class="big" id="bf"></div>
</div>

<div class="block">
<p>Shape Score</p>
<div class="big" id="score"></div>
</div>

<div class="block">
<p>Physique Type</p>
<div id="type"></div>
</div>

<div class="block">
<p>Target Body Fat</p>
<div id="target"></div>
</div>

<div class="block">
<p>Estimated Time</p>
<div id="time"></div>
</div>

</div>

<script>

let altura = localStorage.getItem("altura")
let pescoco = localStorage.getItem("pescoco")
let cintura = localStorage.getItem("cintura")

let gordura = 86.010*Math.log10(cintura-pescoco)-70.041*Math.log10(altura)+36.76
gordura = gordura.toFixed(1)

let score = 100 - gordura

document.getElementById("bf").innerText = gordura + "%"
document.getElementById("score").innerText = Math.round(score)

let tipo=""
let target=""
let tempo=""

if(gordura < 12){
tipo="Elite / Atlético"
target="Manutenção (10-12%)"
tempo="Você já está próximo do ideal"
}
else if(gordura < 18){
tipo="Atlético"
target="10-12%"
tempo="2 a 4 meses"
}
else if(gordura < 25){
tipo="Intermediário"
target="12-15%"
tempo="3 a 6 meses"
}
else{
tipo="Acima do ideal"
target="12-15%"
tempo="6+ meses"
}

document.getElementById("type").innerText = tipo
document.getElementById("target").innerText = target
document.getElementById("time").innerText = tempo

</script>

</body>

</html>
