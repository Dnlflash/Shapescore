<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>ShapeScore</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:420px;
background:rgba(17,24,39,0.7);
backdrop-filter:blur(20px);
border-radius:20px;
padding:35px;
box-shadow:0 0 40px rgba(99,102,241,0.2);
border:1px solid rgba(99,102,241,0.2);
}

h1{
margin:0;
font-size:34px;
text-align:center;
background:linear-gradient(90deg,#6366f1,#22d3ee);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
color:#9ca3af;
margin-bottom:30px;
text-align:center;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:none;
background:#020617;
color:white;
font-size:15px;
outline:none;
border:1px solid rgba(255,255,255,0.05);
}

input:focus{
border:1px solid #6366f1;
box-shadow:0 0 10px #6366f1;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#6366f1,#22d3ee);
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #6366f1;
}

.progressBox{
margin-top:25px;
display:none;
}

.progress{
width:100%;
height:12px;
background:#020617;
border-radius:10px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#6366f1,#22d3ee);
}

.loadingText{
margin-top:8px;
font-size:14px;
color:#9ca3af;
text-align:center;
}

.resultBox{
margin-top:25px;
display:none;
text-align:center;
}

.score{
font-size:52px;
font-weight:bold;
margin-top:10px;
color:#22d3ee;
text-shadow:0 0 15px rgba(34,211,238,0.6);
}

.rank{
margin-top:10px;
font-size:18px;
color:#6366f1;
}

.paywall{
margin-top:30px;
padding:20px;
background:rgba(2,6,23,0.7);
border-radius:14px;
display:none;
border:1px solid rgba(255,255,255,0.05);
position:relative;
overflow:hidden;
}

.paywall::after{
content:"";
position:absolute;
inset:0;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
}

.paywallContent{
position:relative;
z-index:2;
text-align:center;
}

.unlock{
background:linear-gradient(90deg,#a855f7,#6366f1);
margin-top:15px;
}

.lockIcon{
font-size:22px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Shape Score</h1>
<p class="subtitle">Descubra seu potencial estético</p>

<input id="altura" placeholder="Altura (cm)">
<input id="pescoco" placeholder="Pescoço (cm)">
<input id="cintura" placeholder="Cintura (cm)">

<button onclick="analisar()">Calcular meu shape</button>

<div class="progressBox">

<div class="progress">
<div class="bar"></div>
</div>

<p class="loadingText">Analisando composição corporal...</p>

</div>

<div class="resultBox">

<div class="score" id="score"></div>
<div class="rank" id="rank"></div>

</div>

<div class="paywall">

<div class="paywallContent">

<div class="lockIcon">🔒</div>

<p><b>Análise completa bloqueada</b></p>

<p style="color:#9ca3af">
Descubra seu potencial máximo físico e como atingir
</p>

<ul style="text-align:left;color:#9ca3af">
<li>Seu físico ideal projetado</li>
<li>Quanto músculo você pode ganhar</li>
<li>Plano para reduzir gordura</li>
</ul>

<button class="unlock" onclick="comprar()">
Desbloquear análise completa
</button>

</div>

</div>

</div>

<script>

function analisar(){

let altura = document.getElementById("altura").value
let pescoco = document.getElementById("pescoco").value
let cintura = document.getElementById("cintura").value

let gordura = 86.010*Math.log10(cintura-pescoco)-70.041*Math.log10(altura)+36.76

gordura = gordura.toFixed(1)

let score = 100 - gordura

document.querySelector(".progressBox").style.display="block"

let bar=document.querySelector(".bar")

let progresso=0

let loading=[
"Escaneando medidas...",
"Calculando composição corporal...",
"Comparando com banco de dados...",
"Gerando Shape Score..."
]

let texto=document.querySelector(".loadingText")

let etapa=0

let interval=setInterval(function(){

progresso+=2

bar.style.width=progresso+"%"

if(progresso%25==0 && etapa<loading.length){
texto.innerText=loading[etapa]
etapa++
}

if(progresso>=100){

clearInterval(interval)

mostrarResultado(score)

}

},40)

}

function mostrarResultado(score){

document.querySelector(".resultBox").style.display="block"

document.getElementById("score").innerText=Math.round(score)

let rank=""

if(score>85) rank="Elite physique (Top 5%)"
else if(score>75) rank="Acima da média (Top 20%)"
else if(score>65) rank="Bom potencial físico"
else if(score>55) rank="Potencial moderado"
else rank="Abaixo da média"

document.getElementById("rank").innerText=rank

document.querySelector(".paywall").style.display="block"

}

function comprar(){

let altura = document.getElementById("altura").value
let pescoco = document.getElementById("pescoco").value
let cintura = document.getElementById("cintura").value

localStorage.setItem("altura", altura)
localStorage.setItem("pescoco", pescoco)
localStorage.setItem("cintura", cintura)

window.location.href="https://pay.kiwify.com.br/ofelnxq"

}

</script>

</body>

</html>
